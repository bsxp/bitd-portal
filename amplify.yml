version: 1
applications:
  - appRoot: app
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            # Vite inlines VITE_* at build time; write Amplify env vars into .env so the build picks them up
            - env | grep -e '^VITE_' >> .env || true
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
