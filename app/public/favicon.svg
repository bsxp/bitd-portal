<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#863bff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="19" y1="5" x2="29" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8f6ff"/>
      <stop offset="1" stop-color="#c4b3ff"/>
    </linearGradient>
  </defs>

  <!-- Dark tile -->
  <rect x="1" y="1" width="46" height="46" rx="11" fill="#15121d"/>
  <rect x="1.5" y="1.5" width="45" height="45" rx="10.5" fill="none" stroke="#863bff" stroke-opacity="0.25"/>

  <!-- Glow behind the blade -->
  <ellipse cx="24" cy="20" rx="16" ry="18" fill="url(#glow)"/>

  <!-- Dagger -->
  <g>
    <!-- blade -->
    <path d="M24 5 L29 27 L19 27 Z" fill="url(#blade)"/>
    <!-- ridge highlight -->
    <path d="M24 5 L24 27 L19.7 27 Z" fill="#ffffff" fill-opacity="0.35"/>
    <!-- crossguard -->
    <rect x="14.5" y="26.6" width="19" height="3.6" rx="1.8" fill="#863bff"/>
    <!-- grip -->
    <rect x="21.4" y="30.2" width="5.2" height="9" rx="1.4" fill="#6a59a0"/>
    <!-- pommel -->
    <circle cx="24" cy="41.2" r="2.7" fill="#863bff"/>
  </g>
</svg>
